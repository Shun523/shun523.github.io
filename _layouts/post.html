<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | Siitake's Blog</title>
  <link rel="icon" href="{{ '/images/favicon.svg' | relative_url }}" type="image/svg+xml">
  <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}">
  <script src="{{ '/js/script.js' | relative_url }}" defer></script>
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{{ '/' | relative_url }}" aria-label="トップページへ戻る">
      <span class="brand-mark">YATTA!</span>
      <span class="brand-text">Siitake's Portfolio</span>
    </a>

    <button class="menu-button" type="button" aria-label="メニューを開く" aria-controls="site-nav" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav id="site-nav" class="site-nav" aria-label="ブログナビゲーション">
      <ul>
        <li><a href="{{ '/' | relative_url }}">Home</a></li>
        <li><a class="is-current" href="{{ '/blog/' | relative_url }}">Blog</a></li>
        <li><a href="{{ '/games/' | relative_url }}">Games</a></li>
      </ul>
    </nav>
  </header>

  <main class="blog-main">
    <article class="post-content">
      <p class="section-label">Blog Post</p>
      <h1>{{ page.title }}</h1>
      <time class="post-date" datetime="{{ page.date | date_to_xmlschema }}">
        {{ page.date | date: "%Y-%m-%d" }}
      </time>
      {{ content }}
    </article>
  </main>

  <footer class="site-footer">
    <p>&copy; <span id="current-year">2026</span> しーたけ</p>
    <a href="{{ '/blog/' | relative_url }}">記事一覧へ戻る</a>
  </footer>
</body>
</html>
